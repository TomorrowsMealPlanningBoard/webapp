name: Terraform Plan

# infra/terraform/** の変更を含む PR でのみ実行する。
# plan 結果を PR コメントとして貼り付けてレビューを可視化する（apply はしない）。

on:
  pull_request:
    branches: ["main"]
    paths:
      - "infra/terraform/**"

env:
  TF_VERSION: "1.9.0"
  WORKING_DIR: infra/terraform

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write        # WIF に必要
      pull-requests: write   # PR へのコメント投稿に必要

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud (Workload Identity)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_TF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        env:
          # external account credentials の代わりにアクセストークンを直接渡す。
          # Terraform の GCS backend は GOOGLE_OAUTH_ACCESS_TOKEN を優先的に使用する。
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Test (unit)
        id: test
        # mock_provider を使ったユニットテスト。GCP 接続不要。
        run: terraform test -no-color
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        # terraform.tfvars は git 管理外のため TF_VAR_* 環境変数で変数を渡す
        # 非機密変数はデフォルト値が variables.tf に定義済みなので project_id と github_repo のみ必須
        run: terraform plan -no-color -input=false
        continue-on-error: true
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          TF_VAR_project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          TF_VAR_github_repo: ${{ vars.GITHUB_REPO || 'TomorrowsMealPlanningBoard/webapp' }}

      - name: Post plan result as PR comment
        uses: actions/github-script@v7
        if: always()
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fmt     = '${{ steps.fmt.outcome }}';
            const init    = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const test    = '${{ steps.test.outcome }}';
            const plan    = '${{ steps.plan.outcome }}';
            const planOut = process.env.PLAN;

            const icon = (s) => s === 'success' ? '✅' : '❌';

            const body = `## Terraform Plan 結果

            | ステップ | 結果 |
            |---------|------|
            | Format  | ${icon(fmt)} \`${fmt}\` |
            | Init    | ${icon(init)} \`${init}\` |
            | Validate| ${icon(validate)} \`${validate}\` |
            | Test    | ${icon(test)} \`${test}\` |
            | Plan    | ${icon(plan)} \`${plan}\` |

            <details><summary>📋 terraform plan の出力</summary>

            \`\`\`hcl
            ${planOut}
            \`\`\`
            </details>

            > このコメントは自動生成されます。変更を確認してから PR をマージしてください。
            `;

            // 既存コメントがあれば更新、なければ新規作成
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan 結果')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if test or plan failed
        if: steps.test.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: exit 1
