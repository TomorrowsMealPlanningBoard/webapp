name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "tests/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "requirements.txt"
  pull_request:
    branches: ["main"]
    paths:
      - "app/**"
      - "tests/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "requirements.txt"

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t webapp:ci .

